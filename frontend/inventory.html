<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="p-8 bg-slate-50 min-h-screen">

    <div class="flex justify-between items-start mb-8">
        <div>
            <h1 class="text-2xl font-bold text-slate-800">庫存作業與異動紀錄</h1>
            <p class="text-slate-500 text-sm">執行即時進出貨操作、同步成本與校正庫存量</p>
        </div>
        <div class="flex space-x-2">
            <button onclick="syncCosts()" class="bg-orange-500 hover:bg-orange-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow transition">
                <i class="fas fa-sync-alt mr-2"></i>更新最新商品成本
            </button>
            <button onclick="recalculateStock()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-bold shadow transition">
                <i class="fas fa-calculator mr-2"></i>更新最新庫存 (重新校正)
            </button>
        </div>
    </div>

    <!-- 1. 進出貨操作區 -->
    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-8 max-w-2xl">
        <h2 class="text-lg font-semibold text-slate-700 mb-4 flex items-center">
            <i class="fas fa-exchange-alt mr-2 text-emerald-500"></i>庫存進出貨操作
        </h2>
        <form id="transaction-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-1">選擇庫存品項 (Inventory Item)</label>
                <select id="t_item_id" required class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-emerald-500 outline-none transition">
                    <option value="">-- 請選擇品項 --</option>
                </select>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">異動數量</label>
                    <input type="number" id="t_qty" required min="1" placeholder="輸入數量"
                        class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">異動類型</label>
                    <select id="t_type" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-emerald-500 outline-none">
                        <option value="in">進貨 (Inbound)</option>
                        <option value="out">出貨 (Outbound)</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2 rounded-md shadow transition">
                確認送出異動 (寫入 Transaction)
            </button>
        </form>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <!-- 2. 即時庫存狀態表格 -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="bg-slate-50 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
                <h2 class="text-lg font-semibold text-slate-700">目前庫存狀態</h2>
                <button onclick="fetchInventoryStatus()" class="text-indigo-600 hover:text-indigo-800 text-sm">刷新</button>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-slate-200">
                    <thead class="bg-slate-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase">品號</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase">名稱</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase text-center">庫存</th>
                            <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase">成本單價</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-table-body" class="bg-white divide-y divide-slate-200 text-sm">
                        <!-- 載入中 -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 3. 庫存異動紀錄列表 -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="bg-slate-50 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
                <h2 class="text-lg font-semibold text-slate-700">庫存異動明細 (Transaction Logs)</h2>
                <button onclick="fetchTransactions()" class="text-indigo-600 hover:text-indigo-800 text-sm">刷新</button>
            </div>
            <div class="overflow-x-auto h-[400px]">
                <table class="min-w-full divide-y divide-slate-200">
                    <thead class="bg-slate-50 sticky top-0">
                        <tr>
                            <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">時間</th>
                            <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">類型</th>
                            <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase text-center">數量</th>
                            <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">品號 (SKU)</th>
                        </tr>
                    </thead>
                    <tbody id="transaction-table-body" class="bg-white divide-y divide-slate-200 text-xs">
                        <!-- 載入中 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_INV = '/api/inventory/';

        async function init() {
            await Promise.all([fetchInventoryStatus(), fetchTransactions()]);
        }

        // 取得庫存狀態
        async function fetchInventoryStatus() {
            const tbody = document.getElementById('inventory-table-body');
            const select = document.getElementById('t_item_id');
            try {
                const response = await fetch(API_INV);
                const data = await response.json();
                tbody.innerHTML = '';
                select.innerHTML = '<option value="">-- 請選擇品項 --</option>';

                data.forEach(item => {
                    const stockClass = item.current_stock < 10 ? 'text-red-600 font-bold' : 'text-slate-900 font-semibold';
                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="px-6 py-4 font-medium text-slate-900">${item.sku}</td>
                            <td class="px-6 py-4 text-slate-700">${item.name}</td>
                            <td class="px-6 py-4 text-center ${stockClass}">${item.current_stock}</td>
                            <td class="px-6 py-4 text-slate-500 font-mono">$${item.unit_price}</td>
                        </tr>
                    `;
                    select.innerHTML += `<option value="${item.id}">${item.sku} - ${item.name} (存量: ${item.current_stock})</option>`;
                });
            } catch (err) { tbody.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-red-500">無法載入庫存資料</td></tr>'; }
        }

        // 取得異動紀錄
        async function fetchTransactions() {
            const tbody = document.getElementById('transaction-table-body');
            try {
                const response = await fetch(API_INV + 'transactions');
                const data = await response.json();
                tbody.innerHTML = '';
                data.forEach(tx => {
                    const typeLabel = tx.type === 'in' 
                        ? '<span class="text-emerald-600 font-bold">進貨</span>' 
                        : '<span class="text-rose-600 font-bold">出貨</span>';
                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-50">
                            <td class="px-4 py-2 text-slate-400">${new Date(tx.transaction_date).toLocaleString()}</td>
                            <td class="px-4 py-2">${typeLabel}</td>
                            <td class="px-4 py-2 text-center font-bold">${tx.quantity}</td>
                            <td class="px-4 py-2 font-medium text-indigo-600">${tx.sku}</td>
                        </tr>
                    `;
                });
            } catch (err) { tbody.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-red-500">無法載入紀錄</td></tr>'; }
        }

        // 同步成本
        async function syncCosts() {
            if(!confirm('確定要從商品主檔同步最新成本到庫存系統嗎？')) return;
            const res = await fetch(API_INV + 'sync-costs', { method: 'POST' });
            const data = await res.json();
            alert(data.message);
            fetchInventoryStatus();
        }

        // 重新校正庫存
        async function recalculateStock() {
            if(!confirm('將依據所有歷史 Transaction 紀錄重新計算目前的庫存水位，確定執行？')) return;
            const res = await fetch(API_INV + 'recalculate-stock', { method: 'POST' });
            const data = await res.json();
            alert(data.message);
            init();
        }

        // 處理進出貨提交
        document.getElementById('transaction-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                item_id: parseInt(document.getElementById('t_item_id').value),
                quantity: parseInt(document.getElementById('t_qty').value),
                type: document.getElementById('t_type').value
            };
            try {
                const res = await fetch(API_INV + 'transaction', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                if (res.ok) {
                    alert(`✅ 操作成功！新庫存量: ${result.new_stock}`);
                    document.getElementById('transaction-form').reset();
                    init();
                } else { alert(`❌ 操作失敗: ${result.detail}`); }
            } catch (e) { alert('❌ 連線錯誤'); }
        });

        window.onload = init;
    </script>
</body>
</html>
