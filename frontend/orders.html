<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="p-8 bg-slate-50 min-h-screen">

    <div class="mb-8">
        <h1 class="text-2xl font-bold text-slate-800">訂單作業管理</h1>
        <p class="text-slate-500 text-sm">建立新訂單並追蹤歷史單據狀態</p>
    </div>

    <!-- 1. 建立訂單區 -->
    <div class="bg-white p-8 rounded-xl shadow-sm border border-slate-200 mb-10">
        <h2 class="text-xl font-bold text-slate-700 mb-6 flex items-center border-b pb-4">
            <i class="fas fa-file-signature mr-3 text-indigo-500"></i>建立新訂單 (Create Order)
        </h2>
        
        <form id="order-form" class="space-y-8">
            <!-- 訂單主檔資訊 -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">選擇合作夥伴 (Vendor/Customer)</label>
                    <select id="o_vendor_id" required onchange="onPartnerChange(this.value)" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
                        <option value="">-- 請選擇夥伴 --</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">訂單編號</label>
                    <input type="text" id="o_no" required placeholder="例如: ORD-2024050101"
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">承辦人員 ID (UUID)</label>
                    <input type="text" id="o_user_id" required readonly
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg bg-slate-100 text-slate-500 cursor-not-allowed">
                </div>
            </div>

            <!-- 聯絡與送貨資訊 (新欄位) -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 border-t pt-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">聯絡人</label>
                    <input type="text" id="o_contact" placeholder="會自動帶入，亦可修改"
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">聯絡電話</label>
                    <input type="text" id="o_contact_tel" placeholder="會自動帶入，亦可修改"
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">預計送貨日期</label>
                    <input type="date" id="o_ship_date" 
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div class="md:col-span-2 lg:col-span-3">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">送貨地址</label>
                    <input type="text" id="o_ship_address" placeholder="會自動帶入廠商通訊地址，亦可修改"
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div class="md:col-span-2 lg:col-span-3">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">送貨備註</label>
                    <textarea id="o_ship_note" rows="2" placeholder="請輸入送貨相關注意事項..."
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"></textarea>
                </div>
            </div>

            <!-- 訂單明細動態區 -->
            <div class="bg-slate-50 p-6 rounded-xl border border-slate-200">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-bold text-slate-700">訂單明細 (Products)</h3>
                    <button type="button" onclick="addProductRow()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-medium shadow transition">
                        <i class="fas fa-plus mr-2"></i>新增一列商品
                    </button>
                </div>
                
                <table class="w-full border-collapse">
                    <thead class="text-slate-500 text-xs uppercase text-left">
                        <tr>
                            <th class="pb-2 px-2">商品項目</th>
                            <th class="pb-2 px-2 w-24">數量</th>
                            <th class="pb-2 px-2 w-32">單價</th>
                            <th class="pb-2 px-2 w-16">操作</th>
                        </tr>
                    </thead>
                    <tbody id="product-rows">
                        <!-- 動態插入列 -->
                    </tbody>
                </table>
            </div>

            <div class="flex justify-between items-center pt-4">
                <div class="text-right">
                    <span class="text-slate-500 mr-4">預估總金額:</span>
                    <span id="grand-total" class="text-2xl font-bold text-indigo-600">$0</span>
                </div>
                <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-10 py-3 rounded-xl font-bold shadow-lg transition transform hover:-translate-y-0.5">
                    <i class="fas fa-check-double mr-2"></i>確認並送出訂單
                </button>
            </div>
        </form>
    </div>

    <!-- 2. 歷史訂單列表區 -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="bg-slate-800 px-6 py-4 flex justify-between items-center">
            <h2 class="text-lg font-bold text-white">歷史訂單列表</h2>
            <button onclick="fetchOrders()" class="text-indigo-300 hover:text-white text-sm">
                <i class="fas fa-sync mr-1"></i> 刷新列表
            </button>
        </div>

        <!-- 篩選器介面 -->
        <div class="p-6 bg-slate-50 border-b border-slate-200 grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
            <div>
                <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">訂單編號</label>
                <input type="text" id="filter_order_no" placeholder="模糊搜尋..."
                    class="w-full px-3 py-2 border rounded-md text-sm outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">合作夥伴</label>
                <select id="filter_vendor_id" class="w-full px-3 py-2 border rounded-md text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="">-- 全部 --</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">訂單日期範圍</label>
                <div class="flex items-center space-x-2">
                    <input type="date" id="filter_start_date" class="w-full px-2 py-2 border rounded-md text-xs outline-none focus:ring-2 focus:ring-indigo-500">
                    <span class="text-slate-400">~</span>
                    <input type="date" id="filter_end_date" class="w-full px-2 py-2 border rounded-md text-xs outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
            </div>
            <div class="flex space-x-2">
                <button onclick="applyFilters()" class="flex-grow bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 rounded-md text-sm transition shadow-sm">
                    <i class="fas fa-filter mr-1"></i> 執行篩選
                </button>
                <button onclick="resetFilters()" class="bg-slate-200 hover:bg-slate-300 text-slate-600 font-bold py-2 px-4 rounded-md text-sm transition">
                    重置
                </button>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-slate-200">
                <thead class="bg-slate-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase">訂單編號</th>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase">合作夥伴</th>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase">總金額</th>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase">日期</th>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase">狀態</th>
                    </tr>
                </thead>
                <tbody id="order-history-body" class="divide-y divide-slate-200 text-sm">
                    <tr><td colspan="5" class="px-6 py-12 text-center text-slate-400 italic">正在載入歷史單據...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let cachedProducts = [];

        // 當選擇合作夥伴時自動帶入預設值
        async function onPartnerChange(partnerId) {
            if (!partnerId) return;
            try {
                const res = await fetch(`/api/partners/${partnerId}`);
                if (res.ok) {
                    const partner = await res.json();
                    document.getElementById('o_contact').value = partner.contact || '';
                    document.getElementById('o_contact_tel').value = partner.contact_tel || '';
                    document.getElementById('o_ship_address').value = partner.address || '';
                }
            } catch (e) {
                console.error('Fetch Partner Error:', e);
            }
        }

        // 填寫用戶資訊
        function fillUserInfo() {
            const userJson = localStorage.getItem('erp_user');
            console.log('Current User from LocalStorage:', userJson);
            if (userJson) {
                const user = JSON.parse(userJson);
                const userIdField = document.getElementById('o_user_id');
                if (userIdField) {
                    userIdField.value = user.id;
                    console.log('Set User ID to:', user.id);
                }
            } else {
                console.warn('No erp_user found in localStorage');
            }
        }

        // 初始化
        async function init() {
            fillUserInfo();
            await Promise.all([fetchPartners(), fetchProducts(), fetchOrders()]);
            addProductRow(); // 預設新增一列
        }

        // 取得合作夥伴清單
        async function fetchPartners() {
            const res = await fetch('/api/partners/');
            const partners = await res.json();
            const select = document.getElementById('o_vendor_id');
            const filterSelect = document.getElementById('filter_vendor_id');
            
            partners.forEach(p => {
                const optionHtml = `<option value="${p.id}">${p.name} (${p.erp_id})</option>`;
                select.innerHTML += optionHtml;
                filterSelect.innerHTML += optionHtml;
            });
        }

        // 取得商品主檔清單 (供明細選擇)
        async function fetchProducts() {
            const res = await fetch('/api/inventory/products/');
            cachedProducts = await res.json();
        }

        // 取得歷史訂單 (支援篩選)
        async function fetchOrders(queryParams = '') {
            const tbody = document.getElementById('order-history-body');
            try {
                const res = await fetch(`/api/orders/${queryParams}`);
                const orders = await res.json();
                tbody.innerHTML = '';
                
                if (orders.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-12 text-center text-slate-400">查無符合條件的訂單</td></tr>';
                    return;
                }

                orders.forEach(o => {
                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="px-6 py-4">
                                <a href="order_detail.html?id=${o.id}" class="font-bold text-indigo-600 hover:text-indigo-800 hover:underline">
                                    ${o.order_no}
                                </a>
                            </td>
                            <td class="px-6 py-4 text-slate-700 font-medium">${o.vendor ? o.vendor.name : '未知'}</td>
                            <td class="px-6 py-4 font-mono text-indigo-600 font-bold">$${o.total_price.toLocaleString()}</td>
                            <td class="px-6 py-4 text-slate-500">${new Date(o.date_in).toLocaleString()}</td>
                            <td class="px-6 py-4 space-x-2">
                                <span class="px-2 py-1 bg-emerald-100 text-emerald-700 rounded text-xs font-bold">已建立</span>
                                <a href="/api/orders/${o.id}/pdf" target="_blank" class="text-indigo-600 hover:text-indigo-800 text-xs font-bold border border-indigo-200 px-2 py-1 rounded hover:bg-indigo-50 transition">
                                    <i class="fas fa-file-pdf mr-1"></i>出貨單
                                </a>
                            </td>
                        </tr>
                    `;
                });
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-12 text-center text-red-500 font-bold">載入失敗</td></tr>';
            }
        }

        // 執行篩選
        function applyFilters() {
            const orderNo = document.getElementById('filter_order_no').value;
            const vendorId = document.getElementById('filter_vendor_id').value;
            const startDate = document.getElementById('filter_start_date').value;
            const endDate = document.getElementById('filter_end_date').value;

            const params = new URLSearchParams();
            if (orderNo) params.append('order_no', orderNo);
            if (vendorId) params.append('vendor_id', vendorId);
            if (startDate) params.append('start_date', startDate + 'T00:00:00');
            if (endDate) params.append('end_date', endDate + 'T23:59:59');

            fetchOrders('?' + params.toString());
        }

        // 重置篩選
        function resetFilters() {
            document.getElementById('filter_order_no').value = '';
            document.getElementById('filter_vendor_id').value = '';
            document.getElementById('filter_start_date').value = '';
            document.getElementById('filter_end_date').value = '';
            fetchOrders();
        }

        // 動態新增商品列
        function addProductRow() {
            const tbody = document.getElementById('product-rows');
            const row = document.createElement('tr');
            row.className = "border-b border-slate-100 last:border-0";
            
            let options = cachedProducts.map(p => `<option value="${p.id}" data-price="${p.sales_price}">${p.name} ($${p.sales_price})</option>`).join('');
            
            row.innerHTML = `
                <td class="py-3 px-2">
                    <select required class="item-select w-full px-3 py-2 border rounded focus:ring-1 focus:ring-indigo-400 outline-none text-sm">
                        <option value="">-- 選擇商品 --</option>
                        ${options}
                    </select>
                </td>
                <td class="py-3 px-2">
                    <input type="number" required min="1" value="1" class="item-qty w-full px-3 py-2 border rounded focus:ring-1 focus:ring-indigo-400 outline-none text-sm">
                </td>
                <td class="py-3 px-2">
                    <input type="number" step="0.01" class="item-price w-full px-3 py-2 border rounded bg-slate-50 text-slate-500 text-sm" readonly>
                </td>
                <td class="py-3 px-2 text-center">
                    <button type="button" onclick="this.closest('tr').remove(); updateGrandTotal();" class="text-red-400 hover:text-red-600 transition">
                        <i class="fas fa-trash"></i>
                    </button>
                </td>
            `;
            
            tbody.appendChild(row);

            // 自動帶入單價邏輯
            const select = row.querySelector('.item-select');
            const priceInput = row.querySelector('.item-price');
            select.onchange = () => {
                const selectedOption = select.options[select.selectedIndex];
                priceInput.value = selectedOption.dataset.price || 0;
                updateGrandTotal();
            };
            row.querySelector('.item-qty').oninput = updateGrandTotal;
        }

        // 計算總金額
        function updateGrandTotal() {
            let total = 0;
            document.querySelectorAll('#product-rows tr').forEach(row => {
                const qty = parseFloat(row.querySelector('.item-qty').value) || 0;
                const price = parseFloat(row.querySelector('.item-price').value) || 0;
                total += qty * price;
            });
            document.getElementById('grand-total').innerText = `$${total.toLocaleString()}`;
            return total;
        }

        // 提交訂單
        document.getElementById('order-form').onsubmit = async (e) => {
            e.preventDefault();
            
            const products = [];
            document.querySelectorAll('#product-rows tr').forEach(row => {
                const pid = row.querySelector('.item-select').value;
                if(pid) {
                    products.push({
                        product_id: parseInt(pid),
                        amount: parseFloat(row.querySelector('.item-qty').value),
                        unit_price: parseFloat(row.querySelector('.item-price').value),
                        total_price: parseFloat(row.querySelector('.item-qty').value) * parseFloat(row.querySelector('.item-price').value)
                    });
                }
            });

            const payload = {
                user_id: document.getElementById('o_user_id').value,
                vendor_id: document.getElementById('o_vendor_id').value,
                order_no: document.getElementById('o_no').value,
                contact: document.getElementById('o_contact').value,
                contact_tel: document.getElementById('o_contact_tel').value,
                ship_address: document.getElementById('o_ship_address').value,
                ship_note: document.getElementById('o_ship_note').value,
                ship_date: document.getElementById('o_ship_date').value || null,
                total_price: Math.round(updateGrandTotal()),
                products: products
            };

            try {
                const res = await fetch('/api/orders/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    alert('✅ 訂單建立成功！');
                    document.getElementById('order-form').reset();
                    fillUserInfo(); // 重設表單後重新填入用戶資訊
                    document.getElementById('product-rows').innerHTML = '';
                    addProductRow();
                    fetchOrders();
                } else {
                    const err = await res.json();
                    alert(`❌ 錯誤: ${JSON.stringify(err.detail)}`);
                }
            } catch (e) { alert('❌ 連線錯誤'); }
        };

        window.onload = init;
    </script>
</body>
</html>
