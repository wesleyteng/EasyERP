<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyERP 企業管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 隱藏未啟用的頁籤內容 */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <nav class="bg-indigo-600 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <span class="font-bold text-xl tracking-wider">EasyERP</span>
                </div>
                <div class="flex space-x-4">
                    <button onclick="switchTab('inventory')" id="btn-inventory" class="px-3 py-2 rounded-md text-sm font-medium bg-indigo-700 hover:bg-indigo-500 transition">庫存管理</button>
                    <button onclick="switchTab('operation')" id="btn-operation" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-indigo-500 transition">進出貨操作</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8">

        <div id="tab-inventory" class="tab-content active bg-white p-6 rounded-lg shadow-md border border-slate-200">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-slate-700">庫存狀態總覽</h2>
                <button onclick="fetchInventory()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2 rounded shadow transition">重新整理</button>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-slate-200">
                    <thead class="bg-slate-100">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">ID</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">SKU</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">品項名稱</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">庫存量</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">單價</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-table-body" class="bg-white divide-y divide-slate-200">
                        <tr><td colspan="5" class="px-6 py-4 text-center text-slate-500">載入中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div id="tab-operation" class="tab-content bg-white p-6 rounded-lg shadow-md border border-slate-200 max-w-2xl mx-auto">
            <h2 class="text-2xl font-bold text-slate-700 mb-6">新增進出貨紀錄</h2>
            <form id="transaction-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-slate-700">品項 ID (Item ID)</label>
                    <input type="number" id="item_id" required class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700">數量</label>
                    <input type="number" id="quantity" required min="1" class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700">交易類型</label>
                    <select id="type" required class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="in">進貨 (Inbound)</option>
                        <option value="out">出貨 (Outbound)</option>
                    </select>
                </div>
                <div id="form-message" class="text-sm font-medium hidden"></div>
                <div>
                    <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                        送出紀錄
                    </button>
                </div>
            </form>
        </div>

    </main>

    <script>
        // 頁籤切換邏輯
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById(`tab-${tabName}`).classList.add('active');
            
            // 按鈕樣式切換
            document.getElementById('btn-inventory').classList.remove('bg-indigo-700');
            document.getElementById('btn-operation').classList.remove('bg-indigo-700');
            document.getElementById(`btn-${tabName}`).classList.add('bg-indigo-700');

            // 如果切換到庫存頁面，自動刷新資料
            if(tabName === 'inventory') fetchInventory();
        }

        // 呼叫 API 取得庫存資料
        async function fetchInventory() {
            const tbody = document.getElementById('inventory-table-body');
            tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-4 text-center text-slate-500">資料載入中...</td></tr>';
            
            try {
                const response = await fetch('/api/warehouse/items/');
                if (!response.ok) throw new Error('網路回應錯誤');
                const items = await response.json();
                
                tbody.innerHTML = '';
                if(items.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-4 text-center text-slate-500">目前無庫存資料</td></tr>';
                    return;
                }

                items.forEach(item => {
                    // 庫存低於 10 顯示紅色警告
                    const stockClass = item.current_stock < 10 ? 'text-red-600 font-bold' : 'text-slate-900';
                    const row = `
                        <tr class="hover:bg-slate-50">
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500">${item.id}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-slate-900">${item.sku}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-700">${item.name}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm ${stockClass}">${item.current_stock}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500">$${item.unit_price}</td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            } catch (error) {
                console.error('Fetch error:', error);
                tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-4 text-center text-red-500">載入失敗，請確認後端伺服器是否運行中</td></tr>';
            }
        }

        // 處理進出貨表單送出
        document.getElementById('transaction-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msgBox = document.getElementById('form-message');
            msgBox.classList.remove('hidden', 'text-emerald-600', 'text-red-600');
            msgBox.innerText = '處理中...';

            const payload = {
                item_id: parseInt(document.getElementById('item_id').value),
                quantity: parseInt(document.getElementById('quantity').value),
                type: document.getElementById('type').value
            };

            try {
                const response = await fetch('/api/operation/transactions/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    msgBox.classList.add('text-emerald-600');
                    msgBox.innerText = '✅ 交易紀錄成功送出！庫存已更新。';
                    document.getElementById('transaction-form').reset();
                } else {
                    const errorData = await response.json();
                    msgBox.classList.add('text-red-600');
                    msgBox.innerText = `❌ 錯誤：${errorData.detail || '操作失敗'}`;
                }
            } catch (error) {
                msgBox.classList.add('text-red-600');
                msgBox.innerText = '❌ 連線錯誤，請確認伺服器狀態。';
            }
            msgBox.classList.remove('hidden');
        });

        // 初始載入
        fetchInventory();
    </script>
</body>
</html>
