<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyERP 企業管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .sidebar-link.active {
            background-color: #3730a3; /* indigo-800 */
            border-left: 4px solid #818cf8; /* indigo-400 */
        }
    </style>
</head>
<body class="bg-slate-100 font-sans min-h-screen flex">

    <!-- 側邊導覽列 Sidebar -->
    <aside class="w-64 bg-indigo-900 text-white flex-shrink-0 flex flex-col shadow-xl">
        <div class="p-6">
            <h1 class="text-2xl font-bold tracking-wider flex items-center">
                <i class="fas fa-chart-line mr-3"></i>EasyERP
            </h1>
            <p class="text-indigo-300 text-xs mt-1 italic">Micro-ERP Solutions</p>
        </div>
        
        <nav class="mt-4 flex-grow">
            <ul class="space-y-1">
                <li>
                    <a href="javascript:void(0)" onclick="loadPage('partners.html', this)" class="sidebar-link active flex items-center px-6 py-4 hover:bg-indigo-800 transition-colors">
                        <i class="fas fa-users w-6"></i>
                        <span class="ml-3">合作夥伴管理</span>
                    </a>
                </li>
                <li>
                    <a href="javascript:void(0)" onclick="loadPage('productmgt.html', this)" class="sidebar-link flex items-center px-6 py-4 hover:bg-indigo-800 transition-colors">
                        <i class="fas fa-box w-6"></i>
                        <span class="ml-3">商品管理</span>
                    </a>
                </li>
                <li>
                    <a href="javascript:void(0)" onclick="loadPage('inventory.html', this)" class="sidebar-link flex items-center px-6 py-4 hover:bg-indigo-800 transition-colors">
                        <i class="fas fa-boxes w-6"></i>
                        <span class="ml-3">庫存異動作業</span>
                    </a>
                </li>
                <li>
                    <a href="javascript:void(0)" onclick="loadPage('orders.html', this)" class="sidebar-link flex items-center px-6 py-4 hover:bg-indigo-800 transition-colors">
                        <i class="fas fa-file-invoice-dollar w-6"></i>
                        <span class="ml-3">訂單作業</span>
                    </a>
                </li>
            </ul>
        </nav>

        <div class="p-6 text-xs text-indigo-400 border-t border-indigo-800">
            &copy; 2024 EasyERP Version 0.1.0
        </div>
    </aside>

    <!-- 右側主要內容區 Main Content -->
    <main class="flex-grow flex flex-col min-w-0 overflow-hidden">
        <!-- 頂部資訊列 Header -->
        <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shadow-sm">
            <h2 id="page-title" class="text-xl font-semibold text-slate-800">合作夥伴管理</h2>
            <div class="flex items-center space-x-4">
                <span class="text-sm text-slate-500">系統管理員</span>
                <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-bold">
                    A
                </div>
            </div>
        </header>

        <!-- 內容容器 Content Container -->
        <section class="flex-grow p-0 overflow-hidden relative">
            <iframe id="content-frame" src="partners.html" class="w-full h-full border-none"></iframe>
        </section>
    </main>

    <script>
        /**
         * 切換頁面邏輯
         * @param {string} url - 要載入的 HTML 檔案路徑
         * @param {HTMLElement} element - 點擊的連結元素
         */
        function loadPage(url, element) {
            // 1. 更新 iframe 來源
            const frame = document.getElementById('content-frame');
            frame.src = url;

            // 2. 更新標題
            const title = element.querySelector('span').innerText;
            document.getElementById('page-title').innerText = title;

            // 3. 更新側邊欄樣式
            document.querySelectorAll('.sidebar-link').forEach(link => {
                link.classList.remove('active');
            });
            element.classList.add('active');
        }
    </script>
</body>
</html>
