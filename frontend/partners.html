<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="p-8 bg-slate-50 min-h-screen">

    <!-- 標題區域 -->
    <div class="mb-8">
        <h1 class="text-2xl font-bold text-slate-800">合作夥伴管理</h1>
        <p class="text-slate-500 text-sm">管理系統中的客戶與供應商基本資料</p>
    </div>

    <!-- 新增表單區區 -->
    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-8">
        <h2 class="text-lg font-semibold text-slate-700 mb-4 flex items-center">
            <i class="fas fa-plus-circle mr-2 text-indigo-500"></i>新增合作夥伴
        </h2>
        <form id="partner-form" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-1">名稱</label>
                <input type="text" id="name" required placeholder="例如：某某科技有限公司"
                    class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-1">ERP ID</label>
                <input type="text" id="erp_id" required placeholder="系統代碼"
                    class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-1">類型</label>
                <select id="type" class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                    <option value="1">客戶 (Customer)</option>
                    <option value="2">供應商 (Supplier)</option>
                    <option value="0">其他</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-1">電話</label>
                <input type="text" id="tel" placeholder="聯絡電話"
                    class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
            </div>
            <div class="md:col-span-4 flex justify-end">
                <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-md font-medium shadow-sm transition flex items-center">
                    <i class="fas fa-save mr-2"></i>儲存並新增
                </button>
            </div>
        </form>
    </div>

    <!-- 資料列表區區 -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="bg-slate-50 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
            <h2 class="text-lg font-semibold text-slate-700">合作夥伴清單</h2>
            <button onclick="fetchPartners()" class="text-indigo-600 hover:text-indigo-800 text-sm font-medium">
                <i class="fas fa-sync-alt mr-1"></i> 重新整理
            </button>
        </div>
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-slate-200">
                <thead class="bg-slate-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">ERP ID</th>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">名稱</th>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">類型</th>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">電話</th>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">狀態</th>
                    </tr>
                </thead>
                <tbody id="partner-table-body" class="bg-white divide-y divide-slate-200 text-sm text-slate-700">
                    <!-- JavaScript 動態渲染內容 -->
                    <tr>
                        <td colspan="5" class="px-6 py-12 text-center text-slate-400">
                            <i class="fas fa-spinner fa-spin mr-2"></i>資料載入中...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // API 路徑 (根據 main.py 的掛載點)
        const API_BASE = '/api/partners/';

        // 轉換類型代碼為文字
        function getTypeText(type) {
            switch(parseInt(type)) {
                case 1: return '<span class="px-2 py-1 bg-blue-100 text-blue-700 rounded-full text-xs">客戶</span>';
                case 2: return '<span class="px-2 py-1 bg-orange-100 text-orange-700 rounded-full text-xs">供應商</span>';
                default: return '<span class="px-2 py-1 bg-slate-100 text-slate-700 rounded-full text-xs">其他</span>';
            }
        }

        // 取得所有合作夥伴資料
        async function fetchPartners() {
            const tbody = document.getElementById('partner-table-body');
            
            try {
                const response = await fetch(API_BASE);
                if (!response.ok) throw new Error('無法取得資料');
                const data = await response.json();

                tbody.innerHTML = '';
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-slate-500">目前尚無資料</td></tr>';
                    return;
                }

                data.forEach(item => {
                    const row = `
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="px-6 py-4 whitespace-nowrap font-mono text-xs text-indigo-600">${item.erp_id}</td>
                            <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-900">${item.name || '-'}</td>
                            <td class="px-6 py-4 whitespace-nowrap">${getTypeText(item.type)}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-slate-500">${item.tel || '-'}</td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span class="flex items-center">
                                    <span class="h-2 w-2 rounded-full ${item.status ? 'bg-emerald-500' : 'bg-slate-300'} mr-2"></span>
                                    ${item.status ? '啟用中' : '已停用'}
                                </span>
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            } catch (error) {
                console.error('Fetch Error:', error);
                tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-red-500 font-medium">載入失敗：${error.message}</td></tr>`;
            }
        }

        // 處理表單提交
        document.getElementById('partner-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const payload = {
                name: document.getElementById('name').value,
                erp_id: document.getElementById('erp_id').value,
                type: parseInt(document.getElementById('type').value),
                tel: document.getElementById('tel').value,
                status: true
            };

            try {
                const response = await fetch(API_BASE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    // 成功後清空表單並重新載入列表
                    document.getElementById('partner-form').reset();
                    await fetchPartners();
                    alert('✅ 合作夥伴新增成功！');
                } else {
                    const error = await response.json();
                    alert(`❌ 新增失敗：${error.detail || '請檢查輸入欄位'}`);
                }
            } catch (error) {
                alert('❌ 系統連線錯誤');
            }
        });

        // 初始載入
        window.onload = fetchPartners;
    </script>
</body>
</html>
