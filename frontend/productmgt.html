<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="p-8 bg-slate-50 min-h-screen">

    <div class="mb-8">
        <h1 class="text-2xl font-bold text-slate-800">商品主檔管理</h1>
        <p class="text-slate-500 text-sm">維護企業商品基礎資料 (含銷售價與進貨成本)</p>
    </div>

    <!-- 1. 新增/修改商品表單 -->
    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-8">
        <h2 id="form-title" class="text-lg font-semibold text-slate-700 mb-4 flex items-center">
            <i class="fas fa-box-open mr-2 text-indigo-500"></i>新增商品主檔
        </h2>
        <form id="product-form" class="space-y-4">
            <input type="hidden" id="p_id">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">SKU / 編號</label>
                    <input type="text" id="p_sku" required placeholder="例如：ITEM-001"
                        class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">商品名稱</label>
                    <input type="text" id="p_name" required placeholder="例如：無線滑鼠"
                        class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1 text-orange-600">進貨成本 (Cost)</label>
                    <input type="number" id="p_cost" required step="0.01" placeholder="0.00"
                        class="w-full px-3 py-2 border border-orange-200 rounded-md focus:ring-2 focus:ring-orange-500 outline-none bg-orange-50">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1 text-indigo-600">銷售單價 (Price)</label>
                    <input type="number" id="p_price" required step="0.01" placeholder="0.00"
                        class="w-full px-3 py-2 border border-indigo-200 rounded-md focus:ring-2 focus:ring-indigo-500 outline-none bg-indigo-50">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">單位</label>
                    <input type="text" id="p_unit" placeholder="例如：個、打"
                        class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
            </div>
            <div class="flex space-x-2">
                <button type="submit" id="submit-btn" class="flex-grow bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 rounded-md shadow transition">
                    儲存商品
                </button>
                <button type="button" id="cancel-edit" class="hidden bg-slate-200 hover:bg-slate-300 text-slate-700 px-4 py-2 rounded-md transition" onclick="resetProductForm()">
                    取消修改
                </button>
            </div>
        </form>
    </div>

    <!-- 2. 商品主檔清單 -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="bg-indigo-50 px-6 py-4 border-b border-indigo-100 flex justify-between items-center">
            <h2 class="text-lg font-semibold text-indigo-900">商品主檔清單 (Master Data)</h2>
            <button onclick="fetchProducts()" class="text-indigo-600 hover:text-indigo-800 text-sm font-medium">
                <i class="fas fa-sync-alt mr-1"></i> 刷新主檔
            </button>
        </div>
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-slate-200">
                <thead class="bg-slate-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase">商品編號</th>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase">商品名稱</th>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase text-orange-600">進貨成本</th>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase text-indigo-600">銷售單價</th>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase">單位</th>
                        <th class="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase text-center">操作</th>
                    </tr>
                </thead>
                <tbody id="product-table-body" class="bg-white divide-y divide-slate-200 text-sm text-slate-700">
                    <!-- 商品資料載入中 -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_PROD = '/api/inventory/products/';

        async function fetchProducts() {
            const tbody = document.getElementById('product-table-body');
            try {
                const response = await fetch(API_PROD);
                const data = await response.json();
                tbody.innerHTML = '';
                data.forEach(p => {
                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="px-6 py-4 font-medium text-indigo-600">${p.product_no || '-'}</td>
                            <td class="px-6 py-4 text-slate-900">${p.name || '-'}</td>
                            <td class="px-6 py-4 text-orange-700 font-mono">$${p.cost}</td>
                            <td class="px-6 py-4 text-indigo-700 font-mono">$${p.sales_price}</td>
                            <td class="px-6 py-4 text-slate-500">${p.unit || '-'}</td>
                            <td class="px-6 py-4 text-center">
                                <button onclick='editProduct(${JSON.stringify(p)})' class="text-indigo-600 hover:text-indigo-900 font-medium">
                                    <i class="fas fa-edit mr-1"></i>修改
                                </button>
                            </td>
                        </tr>
                    `;
                });
            } catch (e) { tbody.innerHTML = '<tr><td colspan="6" class="p-4 text-center text-red-500">無法載入商品主檔</td></tr>'; }
        }

        function editProduct(product) {
            document.getElementById('form-title').innerHTML = '<i class="fas fa-edit mr-2 text-orange-500"></i>修改商品主檔';
            document.getElementById('p_id').value = product.id;
            document.getElementById('p_sku').value = product.product_no;
            document.getElementById('p_name').value = product.name;
            document.getElementById('p_cost').value = product.cost;
            document.getElementById('p_price').value = product.sales_price;
            document.getElementById('p_unit').value = product.unit;
            
            document.getElementById('submit-btn').classList.replace('bg-indigo-600', 'bg-orange-600');
            document.getElementById('submit-btn').classList.replace('hover:bg-indigo-700', 'hover:bg-orange-700');
            document.getElementById('cancel-edit').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetProductForm() {
            document.getElementById('form-title').innerHTML = '<i class="fas fa-box-open mr-2 text-indigo-500"></i>新增商品主檔';
            document.getElementById('product-form').reset();
            document.getElementById('p_id').value = '';
            document.getElementById('submit-btn').classList.replace('bg-orange-600', 'bg-indigo-600');
            document.getElementById('submit-btn').classList.replace('hover:bg-orange-700', 'hover:bg-indigo-700');
            document.getElementById('cancel-edit').classList.add('hidden');
        }

        document.getElementById('product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const p_id = document.getElementById('p_id').value;
            const payload = {
                product_no: document.getElementById('p_sku').value,
                name: document.getElementById('p_name').value,
                cost: parseFloat(document.getElementById('p_cost').value),
                sales_price: parseFloat(document.getElementById('p_price').value),
                unit: document.getElementById('p_unit').value
            };
            const url = p_id ? `${API_PROD}${p_id}` : API_PROD;
            const method = p_id ? 'PATCH' : 'POST';
            try {
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    alert(p_id ? '✅ 商品修改成功！' : '✅ 商品新增成功！');
                    resetProductForm();
                    fetchProducts();
                } else {
                    const err = await res.json();
                    alert(`❌ 錯誤: ${JSON.stringify(err.detail)}`);
                }
            } catch (e) { alert('❌ 連線錯誤'); }
        });

        window.onload = fetchProducts;
    </script>
</body>
</html>
